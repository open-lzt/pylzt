[project]
name = "pylzt"
version = "0.1.3"
description = "Typed async SDK over the lzt.market / lolzteam API — token-pooled, rate-limited, proxy-aware, generated from the official OpenAPI spec."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "pylzt contributors" }]
keywords = ["lzt", "lolzteam", "marketplace", "sdk", "async", "httpx"]
dependencies = [
    "pydantic>=2.7",
    "structlog>=24.1",
    # HttpxSession is the SDK's only transport; [socks] covers SOCKS5 proxy support.
    "httpx[socks]>=0.27",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.5",
    "mypy>=1.10",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
]

[project.urls]
Homepage = "https://github.com/open-lzt/pylzt"
Repository = "https://github.com/open-lzt/pylzt"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pylzt"]

[tool.ruff]
src = ["src", "tests"]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC", "SIM", "RUF"]
# B008: FastAPI-style Depends() defaults (unused here but harmless). B024/B027: marker
# ABCs / optional no-op hooks — all deliberate.
ignore = ["B008", "B024", "B027"]

[tool.ruff.lint.per-file-ignores]
# Compat shim: .pyi stubs re-export pylzt via star import.
"tests/**" = ["B", "SIM"]
# Generated code sits flat beside hand-written modules (told apart by the auto-gen header
# marker + the `{api}_` / `{api}` naming). Long docstrings/signatures (E501) and single-char
# wire field names (E741, e.g. a spec field literally named `l`) are inherent to the spec.
"src/pylzt/methods/market_*.py" = ["E501", "E741"]
"src/pylzt/methods/forum_*.py" = ["E501", "E741"]
"src/pylzt/methods/antipublic_*.py" = ["E501", "E741"]
"src/pylzt/models/market/*.py" = ["E501", "E741"]
"src/pylzt/models/forum/*.py" = ["E501", "E741"]
"src/pylzt/models/antipublic/*.py" = ["E501", "E741"]
"src/pylzt/enums/*.py" = ["E501", "E741"]
"src/pylzt/facades/*.py" = ["E501", "E741"]

[tool.mypy]
plugins = ["pydantic.mypy"]
python_version = "3.12"
strict = true
mypy_path = ["src"]
packages = ["pylzt"]
warn_unreachable = true
disallow_any_explicit = false

[[tool.mypy.overrides]]
# Codegen'd response models with a `dict[str, X] | list[Any]` field (the spec's
# "object-or-empty-array" shape) pair a `Field(default_factory=list)` with a union
# type — the pydantic mypy plugin can't match that factory's return type against the
# union member it's meant for. Same generated-code carve-out as the ruff per-file-ignores
# above (E501/E741 on these paths); not a real type error.
module = ["pylzt.models.market.*", "pylzt.models.forum.*", "pylzt.models.antipublic.*"]
disable_error_code = ["arg-type"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Repo root on sys.path so `tests/dev_codegen/` can import the `dev.codegen`
# namespace package (no __init__.py at dev/ by design — dev-tooling only).
pythonpath = ["."]
# importlib mode avoids the sys.path-prepend that lets a stray tests/<pkg>/__init__.py
# shadow the real src package (we ship no __init__.py in tests/).
addopts = "--strict-markers --import-mode=importlib -m 'not e2e'"
markers = [
    "e2e: hits the live lzt API with a real token (LZT_E2E_TOKEN) — excluded by default, run with -m e2e",
]

[tool.coverage.run]
source = ["src"]
branch = true

[tool.coverage.report]
fail_under = 80
show_missing = true
