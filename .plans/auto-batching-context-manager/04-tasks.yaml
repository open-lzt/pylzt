- id: T3
  title: "GenericBatchCollector"
  files: ["src/pylzt/lib/batch.py"]
  depends_on: [T1, T2]
  parallelizable: false
  acceptance: >
    GenericBatchCollector(transport_for, batch_size, batch_linger, storage)
    with async submit(method) -> T, internal linger/size-window flush
    (mirrors BatchExecutor's _pending/_lock/_flush_task/_tasks GC-guard
    shape), _do_flush groups pending by method.__api__ before chunking each
    group at MAX_BATCH_JOBS via build_generic_batch_request/
    parse_generic_batch_body, _flush_group resolves each future via
    method.parse_response(...) on success or sets BatchJobFailed on a
    per-job upstream error.
  est_loc: 90

- id: T4
  title: "ContextVar + Client.execute() branch + Client.batching()"
  files: ["src/pylzt/client.py"]
  depends_on: [T3]
  parallelizable: false
  acceptance: >
    Module-level _batching_var: ContextVar[GenericBatchCollector | None] =
    ContextVar("_batching_var", default=None). execute() checks it and
    routes to collector.submit(method) when set, else unchanged direct path.
    New async context manager Client.batching(*, batch_size=MAX_BATCH_JOBS,
    batch_linger=0.01) sets the var on enter, force-flushes via
    collector._do_flush() and resets the var on exit (finally block).
  est_loc: 25

- id: T5
  title: "Unit tests — GenericBatchCollector"
  files: ["tests/pylzt/test_batch.py"]
  depends_on: [T3]
  parallelizable: true
  acceptance: >
    Mirrors BatchExecutor's test shapes: N concurrent submit() calls
    coalesce into one flush; each caller gets its own result; linger window
    flushes a partial batch; over-cap splits into chunk requests; mixed
    __api__ methods split into separate group flushes; a per-job upstream
    error surfaces as BatchJobFailed on that caller's future only (siblings
    unaffected).
  est_loc: 90

- id: T6
  title: "Integration tests — Client.batching()"
  files: ["tests/pylzt/test_client.py"]
  depends_on: [T4]
  parallelizable: true
  acceptance: >
    Five concurrent `await client.execute(method)` calls inside one `async
    with client.batching():` block produce exactly one transport-level
    /batch send (fake transport call-count assertion). Exiting the block
    force-flushes stragglers under the linger window — no dropped calls.
    Client.execute_batch()'s existing eager-list behavior (incl.
    MixedBatchApiTargets) unchanged — full existing suite stays green.
  est_loc: 70

