# rate-limit-sync — task DAG (module-lite)
# See 00-overview.md for full contracts, rationale, worktree.

- id: T1
  title: "RateLimitSnapshot DTO"
  files: ["src/pylzt/token_pool/rate_limit.py"]
  depends_on: []
  parallelizable: true
  acceptance: >
    New file defines frozen dataclass RateLimitSnapshot(limit: int,
    remaining: int, reset: int, bucket: str | None = None) and classmethod
    from_body(body: dict[str, object]) -> RateLimitSnapshot | None that
    returns None on missing/malformed system_info.rate_limit and never
    raises (KeyError/TypeError/ValueError caught internally).
  est_loc: 35

- id: T2
  title: "BaseTokenPool.report_rate_limit no-op default"
  files: ["src/pylzt/token_pool/base.py"]
  depends_on: [T1]
  parallelizable: false
  acceptance: >
    BaseTokenPool gains concrete method
    report_rate_limit(token_id: TokenId, rate_class: RateClass,
    snapshot: RateLimitSnapshot) -> None with a no-op body, matching the
    existing report_proxy/quarantine convention. _StaticBearerPool
    (unmodified) keeps inheriting the no-op.
  est_loc: 12

- id: T3
  title: "TokenBucket.reconcile + RateBucketSet.reconcile (clamp-only)"
  files: ["src/pylzt/token_pool/bucket.py"]
  depends_on: [T1]
  parallelizable: true
  acceptance: >
    TokenBucket.reconcile(remaining: int, clock: Clock) -> None sets
    self._tokens = min(self._tokens, remaining), does not touch
    capacity/rate/_last. RateBucketSet.reconcile(rate_class: RateClass,
    snapshot: RateLimitSnapshot, clock: Clock) -> None looks up
    self._buckets[rate_class] and delegates; unknown rate_class caught
    (KeyError) and no-op.
  est_loc: 25

- id: T4
  title: "RoundRobinTokenPool.report_rate_limit wiring"
  files: ["src/pylzt/token_pool/round_robin.py"]
  depends_on: [T2, T3]
  parallelizable: false
  acceptance: >
    RoundRobinTokenPool.report_rate_limit(token_id, rate_class, snapshot)
    looks up self._buckets.get(token_id); if found, calls
    bucket_set.reconcile(rate_class, snapshot, self._clock); unknown
    token_id (e.g. quarantined mid-flight) is a silent no-op.
  est_loc: 12

- id: T5
  title: "ClientConfig.enable_server_rate_sync toggle"
  files: ["src/pylzt/config.py"]
  depends_on: []
  parallelizable: true
  acceptance: >
    ClientConfig gains enable_server_rate_sync: bool = True field, no
    other fields touched.
  est_loc: 3

- id: T6
  title: "RateLimitedTransport call-site wiring"
  files: ["src/pylzt/transport/rate_limited.py"]
  depends_on: [T4, T5]
  parallelizable: false
  acceptance: >
    In send()'s success branch, before `return resp`: when
    self._config.enable_server_rate_sync is True (transport gains a
    ClientConfig-derived flag, threaded via constructor same pattern as
    existing deps), parse RateLimitSnapshot.from_body(resp.body); if not
    None, call self._token_pool.report_rate_limit(lease.token.token_id,
    req.rate_class, snapshot). When flag is False, report_rate_limit is
    never called. Existing report_proxy(OK) call and return resp
    unchanged otherwise.
  est_loc: 15

- id: T7
  title: "Unit tests — bucket/pool reconcile"
  files: ["tests/pylzt/test_token_pool.py"]
  depends_on: [T3, T4]
  parallelizable: true
  acceptance: >
    Covers: clamp-down when remaining < current tokens; no-op (tokens
    unchanged) when remaining > current tokens; RateBucketSet.reconcile
    no-op on unknown RateClass; RoundRobinTokenPool.report_rate_limit
    no-op on unknown token_id. Existing tests (drain/refill/independence/
    rotation/quarantine) still pass unmodified.
  est_loc: 70

- id: T8
  title: "Unit tests — RateLimitSnapshot + transport wiring"
  files:
    - "tests/pylzt/test_token_pool.py"
    - "tests/pylzt/test_rate_limited_transport.py"
  depends_on: [T1, T6, T7]
  parallelizable: false
  acceptance: >
    RateLimitSnapshot.from_body: valid body -> correct snapshot; missing
    system_info -> None; missing rate_limit -> None; non-dict/malformed
    types -> None (no raise). RateLimitedTransport: successful response
    with system_info.rate_limit in resp.body -> report_rate_limit called
    once with correct token_id/rate_class/snapshot; toggle False ->
    report_rate_limit never called even with valid body.
  est_loc: 55

