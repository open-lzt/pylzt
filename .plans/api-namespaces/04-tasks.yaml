- id: T12
  title: "SyncClient + Sync*Namespace wiring"
  files: ["src/pylzt/sync/client.py"]
  depends_on: [T10, T11]
  parallelizable: false
  acceptance: >
    SyncClient(tokens=[...]) constructs synchronously; SyncClient(...).market.get_lot(
    item_id=...) returns a Lot (blocking call, no `await`); same for .forum/.antipublic.
    `with SyncClient(tokens=[...]) as client: ...` works as a context manager; close()
    is idempotent. Every SyncClient method's return type matches its async
    counterpart's unwrapped type (mypy --strict clean — this is the whole point
    versus Pyrogram's runtime-patch approach, which loses this).
  est_loc: 80

