- id: T5
  title: "_Namespace base + 3 namespace classes"
  files: ["src/pylzt/facades/_namespace.py"]
  depends_on: [T4]
  parallelizable: false
  acceptance: >
    MarketNamespace(client).execute(SomeMarketMethod()) delegates to
    client.execute(...) and returns its result unchanged; same for Forum/Antipublic
    namespaces. CRITICAL (W3.5 finding): also assert
    `await market_namespace(SomeMarketMethod())` (i.e. `__call__`, not just `.execute`)
    works — a real generated method like `await client.market.get_lot_something()`
    must NOT raise `TypeError: not callable`. `_Namespace` must delegate both
    `execute` AND `__call__` (GeneratedXFacade's own `__call__` is a TYPE_CHECKING-only
    stub, never present at runtime — do not assume it exists).
  est_loc: 60

- id: T6
  title: "Client.__init__ rewiring — namespaces + antipublic transport"
  files: ["src/pylzt/client.py", "src/pylzt/errors.py"]
  depends_on: [T2, T5]
  parallelizable: false
  acceptance: >
    Client no longer inherits GeneratedMarketFacade/GeneratedForumFacade (plain
    `@final class Client:`). Client(tokens=[...]).market is a MarketNamespace;
    .forum is a ForumNamespace; .antipublic is an AntipublicNamespace (constructed
    even without antipublic_key — calling any client.antipublic.* method in that case
    raises the new `CredentialMissing("antipublic_key")`, not DependencyMissing — see
    Risks R2, corrected by W3.5). Client(tokens=[...], antipublic_key="x")
    .antipublic.check_license() routes through a dedicated RateLimitedTransport
    wrapping _StaticBearerPool. execute/__call__/reconfigure/aclose signatures on
    Client are byte-for-byte unchanged. `_rate_limited` is parametrized to accept an
    explicit `pool` argument (W3.5 finding: it hard-codes `self._token_pool` today —
    must accept `_StaticBearerPool` for the antipublic leg). `_transport_for` becomes
    a genuine 3-way match on `ApiTarget` (today anything non-MARKET silently falls to
    `_forum_transport` — verify this bug doesn't already misroute nothing today only
    because no 3rd target existed; add a test that a hypothetical 3rd target routes
    correctly, not just market/forum).
  est_loc: 100

