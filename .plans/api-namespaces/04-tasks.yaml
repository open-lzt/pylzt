- id: T10
  title: "SyncRunner (background-thread event loop)"
  files: ["src/pylzt/sync/runner.py"]
  depends_on: [T9]
  parallelizable: true
  acceptance: >
    SyncRunner().run(some_coro()) blocks and returns the coroutine's result, callable
    from a plain sync script AND from inside a caller's own running event loop
    (unlike asyncio.run(), which raises RuntimeError in the latter case — a test must
    cover calling .run() from inside an async test function via a thread/executor to
    prove this). close() stops the loop and joins the thread; calling close() twice
    is a no-op, not an error. Loop starts lazily (no thread until first .run() call).
  est_loc: 70

- id: T11
  title: "Codegen: sync facade rendering"
  files: ["dev/codegen/generator.py"]
  depends_on: [T4]
  parallelizable: true
  acceptance: >
    generator.py gains a sync-render pass that, given an already-rendered async
